    const searchBox = document.getElementById('searchBox');
    const wordList = document.getElementById('wordList');
    const stats = document.getElementById('stats');

    function highlightText(text, keyword) {
        if (!keyword) return text;
        const regex = new RegExp(`(${keyword})`, 'gi');
        return text.replace(regex, '<span class="highlight">$1</span>');
    }

    function renderWords(keyword = '') {
        const cleanKeyword = keyword.trim().toLowerCase();
        
        const filtered = dictionary.filter(item => {
            return item.word.toLowerCase().includes(cleanKeyword) ||
                   item.cat.toLowerCase().includes(cleanKeyword) ||
                   item.literal.toLowerCase().includes(cleanKeyword) ||
                   item.ai.toLowerCase().includes(cleanKeyword);
        });

        stats.innerText = `共收录 ${dictionary.length} 个官方状态词 | 找到 ${filtered.length} 个匹配结果`;

        if (filtered.length === 0) {
            wordList.innerHTML = '<div class="no-results">🔍 没有找到相关的魔法词汇，换个词试试吧？</div>';
            return;
        }

        wordList.innerHTML = filtered.map(item => `
            <div class="word-card">
                <div class="word-header">
                    <div class="word-name">${highlightText(item.word, cleanKeyword)}</div>
                    <div class="word-category">${highlightText(item.cat, cleanKeyword)}</div>
                </div>
                <div class="word-body">
                    <div class="meaning-item">
                        <span class="label">字面释义:</span>
                        <span class="value-literal">${highlightText(item.literal, cleanKeyword)}</span>
                    </div>
                    <div class="meaning-item">
                        <span class="label">Claude 状态:</span>
                        <span class="value-ai">${highlightText(item.ai, cleanKeyword)}</span>
                    </div>
                </div>
            </div>
        `).join('');
    }

    searchBox.addEventListener('input', (e) => {
        renderWords(e.target.value);
    });

    renderWords();
